name: iOS Dev Build

on:
  workflow_dispatch:  # Manual trigger only — you click "Run workflow" on GitHub

jobs:
  build-ios:
    runs-on: macos-15  # Apple Silicon M1 runner — free for public repos
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: expo/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: expo
        run: npm install --legacy-peer-deps

      - name: Build iOS locally
        working-directory: expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform ios --profile development --local --non-interactive --output ./build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: athlt-dev-build
          path: expo/build.ipa
          retention-days: 7
